<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
  html, body { width:80px; height:176px; background:transparent; overflow:hidden; font-family:-apple-system,"Microsoft YaHei",sans-serif; }
  #app { width:80px; height:176px; position:relative; display:flex; flex-direction:column; align-items:center; padding:8px 0 6px; cursor:grab; }
  #app:active { cursor:grabbing; }  #drag-bar { position:absolute; top:8px; left:50%; transform:translateX(-50%); width:28px; height:3px; background:rgba(255,255,255,0.18); border-radius:2px; cursor:grab; z-index:10; }
  #drag-bar:active { cursor:grabbing; }
  canvas { display:block; }
  #info { text-align:center; padding:4px 0 0; }
  #pct { font-size:16px; font-weight:800; color:#fff; line-height:1; transition:color .5s; }
  #size-lbl { font-size:9px; color:rgba(255,255,255,0.4); margin-top:2px; }
  #plan-lbl { font-size:8px; color:rgba(255,255,255,0.22); margin-top:1px; letter-spacing:.4px; }
  #close { position:absolute; top:8px; right:8px; width:15px; height:15px; border-radius:50%; background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.3); font-size:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  #close:hover { background:#ef4444; color:#fff; }
</style>
</head>
<body>
<div id="app">
  <div id="close">×</div>
  <canvas id="hg" width="64" height="128"></canvas>
  <div id="info">
    <div id="pct">--%</div>
    <div id="size-lbl">待机中</div>
    <div id="plan-lbl">MAX 1M</div>
  </div>
</div>
<script type="module" src="/src/float.ts"></script>
</body>
</html>
