<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
  html, body {
    width:100vw; height:100vh;
    background: transparent !important;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #app {
    width:100vw; height:calc(100vh - 8px);
    background:#0e0e16;
    border-radius: 14px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    cursor:grab;
    position:relative;
    font-family:"Segoe UI Variable Text","Segoe UI","Microsoft YaHei",-apple-system,system-ui,sans-serif;
    border:1px solid rgba(255,255,255,0.08);
    transform: translate3d(0, 0, 0);
    backface-visibility: hidden;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 0 0 1px rgba(14,14,22,0.4);
  }
  #app:active { cursor:grabbing; }
  #close { position:absolute; top:7px; right:7px; width:13px; height:13px; border-radius:50%; background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.35); font-size:9px; display:flex; align-items:center; justify-content:center; cursor:pointer; line-height:1; }
  #close:hover { background:#ef4444; color:#fff; }
  #ctx-label { font-size:9px; font-weight:700; letter-spacing:3px; color:rgba(34,197,94,0.75); transition:color .4s; }
  #pct { font-size:26px; font-weight:800; color:#22c55e; letter-spacing:-1px; line-height:1; transition:color .4s; }
  #bar-wrap { width:56px; height:2px; background:rgba(255,255,255,0.08); border-radius:1px; overflow:hidden; }
  #bar { height:100%; background:#22c55e; border-radius:1px; width:100%; transition:width .8s ease,background .4s; }
  #plan-lbl { font-size:8px; font-weight:600; color:rgba(255,255,255,0.7); letter-spacing:1px; }
  @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .flashing { animation:flash .8s ease-in-out infinite; }
</style>
</head>
<body>
<div id="app">
  <div id="close">×</div>
  <div id="ctx-label">CTX</div>
  <div id="pct">100%</div>
  <div id="bar-wrap"><div id="bar"></div></div>
  <div id="plan-lbl">MAX 1M</div>
</div>
<script type="module" src="/src/float.ts"></script>
</body>
</html>
